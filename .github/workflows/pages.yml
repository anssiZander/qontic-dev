name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install measurement dependencies
        working-directory: measurement
        run: npm install

      - name: Build measurement app
        working-directory: measurement
        run: npm run build

      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -av --exclude='_site' --exclude='.git' --exclude='measurement/node_modules' ./ ./_site/
          rm -rf _site/measurement
          mkdir -p _site/measurement
          cp -r measurement/dist/* _site/measurement/

          # Authorized reuse: Anssi Zander gave permission to copy these demos.
          git clone --depth 1 https://github.com/anssiZander/BohmianDoubleSlit.git /tmp/BohmianDoubleSlit
          rm -rf _site/bohmian-double-slit-webgl
          mkdir -p _site/bohmian-double-slit-webgl
          cp -r /tmp/BohmianDoubleSlit/* _site/bohmian-double-slit-webgl/
          cp bohmian-double-slit-webgl/index.html _site/bohmian-double-slit-webgl/index.html

          git clone --depth 1 https://github.com/anssiZander/BohmianTunneling.git /tmp/BohmianTunneling
          rm -rf _site/bohmian-tunneling
          mkdir -p _site/bohmian-tunneling
          cp -r /tmp/BohmianTunneling/* _site/bohmian-tunneling/
          cp bohmian-tunneling/index.html _site/bohmian-tunneling/index.html

          git clone --depth 1 https://github.com/anssiZander/Bohmian-Free-Packet.git /tmp/Bohmian-Free-Packet
          rm -rf _site/bohmian-free-packet-2d
          mkdir -p _site/bohmian-free-packet-2d
          cp -r /tmp/Bohmian-Free-Packet/* _site/bohmian-free-packet-2d/
          cp bohmian-free-packet-2d/index.html _site/bohmian-free-packet-2d/index.html

          git clone --depth 1 https://github.com/anssiZander/Bohmian-Free-3D.git /tmp/Bohmian-Free-3D
          rm -rf _site/bohmian-free-particle-box-3d
          mkdir -p _site/bohmian-free-particle-box-3d
          cp -r /tmp/Bohmian-Free-3D/* _site/bohmian-free-particle-box-3d/
          cp bohmian-free-particle-box-3d/index.html _site/bohmian-free-particle-box-3d/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
